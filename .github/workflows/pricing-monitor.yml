name: Pricing Change Monitor

on:
  schedule:
    # Every 12 hours
    - cron: '0 */12 * * *'
  workflow_dispatch:  # Allow manual triggering from GitHub UI

jobs:
  check-pricing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pricing monitor
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REMINDER_RECIPIENTS: ${{ secrets.REMINDER_RECIPIENTS }}
        run: python src/notifications/pricing_monitor.py

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pricing_snapshot.json
          git diff --cached --quiet || git commit -m "Update pricing snapshot [skip ci]"
          git push
